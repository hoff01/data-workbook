defaults:
  start_date: "2018-01-01"
  granularity: daily
  unit: kbd
  only_realized: false
  with_forecast: true
  with_intra_region: true
  with_freight_view: false
  with_product_estimation: false

external:
  with_intra_country: false
  us_zone: United States
  us_import_splits:
    - origin countries
    - origin trading regions
    - products
  us_export_splits:
    - destination countries
    - destination trading regions
    - products
  europe_import_splits:
    - origin countries
    - origin trading regions
    - products
  europe_export_splits:
    - destination countries
    - destination trading regions
    - products

domestic_padd:
  with_intra_country: true
  from_zones:
    - United States
  to_zones:
    - United States
  flow_direction: export
  splits:
    - origin padds
    - destination padds
    - products

padd1_import_guides:
  commodities:
    - diesel
  splits:
    - origin countries
    - origin trading regions
    - origin padds
    - destination padds
    - products
  regions:
    padd1ab:
      label: PADD 1A/B imports by origin country
      to_zones:
        - United States
      with_intra_country: false
      route_group: padd1ab_imports_by_origin
    padd1c:
      label: PADD 1C imports by origin country with intracountry
      to_zones:
        - United States
      with_intra_country: true
      route_group: padd1c_imports_by_origin
